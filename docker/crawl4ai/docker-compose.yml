services:
  crawl4ai:
    image: unclecode/crawl4ai:latest
    container_name: vibecosystem-crawl4ai
    ports:
      - "11235:11235"
    environment:
      - CRAWL4AI_API_TOKEN=${CRAWL4AI_API_TOKEN:-}
      - MAX_CONCURRENT_TASKS=5
      # Optional: enables LLM-based extraction strategies
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    volumes:
      - crawl4ai-data:/app/data
      - crawl4ai-cache:/app/cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11235/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"

volumes:
  crawl4ai-data:
  crawl4ai-cache:
