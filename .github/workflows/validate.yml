name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-agents:
    name: Validate Agents
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check agent frontmatter
        run: |
          echo "Checking agent YAML frontmatter..."
          errors=0
          for f in agents/*.md; do
            if ! head -1 "$f" | grep -q "^---"; then
              echo "ERROR: $f missing YAML frontmatter"
              errors=$((errors + 1))
            fi
          done
          if [ $errors -gt 0 ]; then
            echo "$errors agent(s) have frontmatter issues"
            exit 1
          fi
          echo "All agents have valid frontmatter"

      - name: Count assets
        run: |
          agents=$(ls agents/*.md 2>/dev/null | wc -l)
          skills=$(find skills -name "prompt.md" 2>/dev/null | wc -l)
          rules=$(ls rules/*.md 2>/dev/null | wc -l)
          echo "Agents: $agents"
          echo "Skills with prompt.md: $skills"
          echo "Rules: $rules"

  validate-skills:
    name: Validate Skills
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check skill frontmatter
        run: |
          echo "Checking skill prompt.md frontmatter..."
          errors=0
          for f in $(find skills -name "prompt.md"); do
            if ! head -1 "$f" | grep -q "^---"; then
              echo "WARNING: $f missing YAML frontmatter"
              errors=$((errors + 1))
            fi
          done
          echo "$errors skill(s) have frontmatter issues (non-blocking)"

  validate-install:
    name: Validate Install Script
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Syntax check install.sh
        run: bash -n install.sh

      - name: ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: '.'
          additional_files: 'install.sh'
          severity: warning

  validate-hooks:
    name: Validate Hooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: hooks
        run: npm ci

      - name: Audit dependencies
        working-directory: hooks
        run: npm audit --omit=dev

      - name: Build hooks and verify dist is up-to-date
        working-directory: hooks
        run: |
          npm run build
          if ! git diff --quiet dist/; then
            echo "ERROR: hooks/dist/ is out of sync with hooks/src/"
            echo "Run 'cd hooks && npm run build' and commit the result"
            git diff --stat dist/
            exit 1
          fi
          echo "hooks/dist/ is up-to-date with source"

  markdown-lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint markdown
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: |
            README.md
            CONTRIBUTING.md
            SECURITY.md
            CHANGELOG.md
            CODE_OF_CONDUCT.md
        continue-on-error: true
